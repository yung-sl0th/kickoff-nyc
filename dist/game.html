    }

    // Shooter position controls
    if(phase==='aim'||phase==='power'){
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.font='11px Nunito';ctx.textAlign='center';
      ctx.fillText('← → move shooter  🖱 mouse to aim corner  SPACE to power up',W*.5,H*.95);
    }

    // CPU prep countdown
    if(phase==='cpu_prep'){
      ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.roundRect(W/2-120,H*.87,240,26,8);ctx.fill();
      ctx.fillStyle='#f5c518';ctx.font='bold 13px Nunito';ctx.textAlign='center';ctx.fillText(`CPU kicking in ${Math.ceil(cpuTimer/30)}... ⬅ ➡ Move YOUR keeper!`,W*.5,H*.87+16);
    }

    drawScoreTracker();

    // Kick counter top
    const isMyTurn=ORDER[round]==='mex';
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();ctx.roundRect(W/2-130,100,260,30,8);ctx.fill();
    ctx.fillStyle=isMyTurn?'#80ff80':'#ff8080';ctx.font='bold 13px Nunito';ctx.textAlign='center';
    const kickN=Math.floor(round/2)+1;
    const label=phase==='intro'?'🇲🇽 PENALTY SHOOTOUT — 5 KICKS EACH':`Kick ${Math.min(kickN,5)}/5 — ${isMyTurn?'🇲🇽 YOUR TURN':'🤖 CPU KICKING'}`;
    ctx.fillText(label,W*.5,118);

    // Intro overlay
    if(phase==='intro'){
      const fade=Math.min(.9,introT/50);ctx.fillStyle=`rgba(0,0,0,${fade})`;ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#f5c518';ctx.font=`bold ${Math.min(58,W*.08)}px Bangers`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('PENALTY SHOOTOUT',W*.5,H*.33);
      ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(26,W*.035)}px Bangers`;ctx.fillText('🇲🇽 MEXICO  vs  CPU 🤖',W*.5,H*.44);
      ctx.font=`${Math.min(17,W*.023)}px Nunito`;ctx.fillStyle='#ccc';ctx.fillText('5 kicks each  •  Best total wins',W*.5,H*.52);
      ctx.font=`bold ${Math.min(20,W*.027)}px Nunito`;ctx.fillStyle='#f5c518';ctx.fillText(introT>100?'GET READY...':introT>55?'STEP UP TO THE SPOT!':'HERE WE GO!',W*.5,H*.62);
      introT--;if(introT<=0){phase='walkup';isWalking=true;walkerY=H*.95;walkerTargetY=H*.75;}
    }

    // Result flash
    if(resultMsg&&resultT>0&&phase!=='aim'&&phase!=='power'){
      const a=Math.min(1,resultT/22);ctx.globalAlpha=a;
      ctx.fillStyle=resultMsg.includes('GOL')||resultMsg.includes('SAVE')?'#f5c518':'#cc2200';
      ctx.font=`bold ${Math.min(52,W*.072)}px Bangers`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(resultMsg,W*.5,H*.5);
      ctx.globalAlpha=1;
      if((resultMsg.includes('GOL')||resultMsg.includes('GREAT'))&&resultT>50){
        ctx.globalAlpha=.1+.04*Math.sin(wT*5);
        ctx.fillStyle='#006847';ctx.fillRect(0,0,W/3,H);ctx.fillStyle='#fff';ctx.fillRect(W/3,0,W/3,H);ctx.fillStyle='#CE1126';ctx.fillRect(W*2/3,0,W/3,H);ctx.globalAlpha=1;
      }
    }
  }

  function onKey(e){
    if(!gameActive)return;
    if((phase==='cpu_prep'||phase==='cpu_fly')&&(e.code==='ArrowLeft'||e.code==='ArrowRight')){e.stopPropagation();e.preventDefault();if(e.code==='ArrowLeft'){keeperX=Math.max(GBL+20,keeperX-30);userMovedKeeper=true;}else{keeperX=Math.min(GBR-20,keeperX+30);userMovedKeeper=true;}return;}
    if(phase==='aim'||phase==='power'){
      if(e.code==='ArrowLeft')shooterX=Math.max(GBL+20,shooterX-18);
      if(e.code==='ArrowRight')shooterX=Math.min(GBR-20,shooterX+18);
    }
    if(e.code==='Space'){e.stopPropagation();e.preventDefault();
      if(phase==='aim'){phase='power';power=0;powering=true;if(!powInterval)powInterval=setInterval(()=>{power=Math.min(100,power+3.5);},30);}
    }
  }
  function onKeyUp(e){
    if(e.code==='Space'&&phase==='power'&&powInterval){
      clearInterval(powInterval);powInterval=null;powering=false;
      const finalAim=aimX;
      const tY=GT+16+(1-power/100)*(GH-GT-22);
      ballX=shooterX;ballY=H*.84;ballTX=finalAim;ballTY=tY;ballProg=0;
      // Keeper guesses
      setTimeout(()=>{keeperDived=true;const shotLeft=finalAim<W*.5;const guessRight=Math.random()<.42;keeperDiveX=guessRight?(shotLeft?GBL+50:GBR-50):(shotLeft?GBR-50:GBL+50);},200);
      phase='fly';
    }
  }
  document.addEventListener('keydown',onKey,true);document.addEventListener('keyup',onKeyUp,true);
  setTimeout(()=>{document.removeEventListener('keydown',onKey,true);document.removeEventListener('keyup',onKeyUp,true);},(currentChapter?.game?.time||200)*1000+1000);
  loop();
};
// ── BOOT ─────────────────────────────────────────
$('start-btn').addEventListener('click', e => {
  e.stopPropagation();
  storySpaceBlocked = true;
  setTimeout(() => { storySpaceBlocked = false; }, 600);
  startGame();
});
</script>

<!-- Rotate hint -->
<div class="rotate-hint">↺ Rotate for better gameplay</div>

<!-- Touch controls — shown on mobile only -->
<div id="touch-controls">
  <!-- D-pad left -->
  <div class="dpad" id="dpad">
    <div></div>
    <div class="dpad-btn" id="btn-up" data-key="ArrowUp">↑</div>
    <div></div>
    <div class="dpad-btn" id="btn-left" data-key="ArrowLeft">←</div>
    <div class="dpad-center"></div>
    <div class="dpad-btn" id="btn-right" data-key="ArrowRight">→</div>
    <div></div>
    <div class="dpad-btn" id="btn-down" data-key="ArrowDown">↓</div>
    <div></div>
  </div>

  <!-- Action buttons right -->
  <div class="action-btns">
    <div class="action-btn btn-shoot" id="btn-shoot">SHOOT</div>
    <div class="action-btn btn-pass" id="btn-pass">PASS</div>
  </div>
</div>

<script>
// ── MOBILE TOUCH CONTROLS ─────────────────────────
(function() {
  // Only activate on mobile touch devices
  if (!('ontouchstart' in window)) return;
  if (window.innerWidth >= 900) return;

  const held = new Set();

  function fireKey(code, type) {
    const e = new KeyboardEvent(type, {
      code, key: code.replace('Arrow',''),
      bubbles: true, cancelable: true
    });
    document.dispatchEvent(e);
  }

  function pressBtn(el, code) {
    if (held.has(code)) return;
    held.add(code);
    el.classList.add('pressed');
    fireKey(code, 'keydown');
  }

  function releaseBtn(el, code) {
    if (!held.has(code)) return;
    held.delete(code);
    el.classList.remove('pressed');
    fireKey(code, 'keyup');
  }

  // D-pad buttons
  ['up','down','left','right'].forEach(dir => {
    const el = document.getElementById('btn-' + dir);
    if (!el) return;
    const code = 'Arrow' + dir.charAt(0).toUpperCase() + dir.slice(1);

    el.addEventListener('touchstart', e => { e.preventDefault(); pressBtn(el, code); }, { passive: false });
    el.addEventListener('touchend',   e => { e.preventDefault(); releaseBtn(el, code); }, { passive: false });
    el.addEventListener('touchcancel',e => { e.preventDefault(); releaseBtn(el, code); }, { passive: false });
  });

  // Shoot button = Space (hold to power up, release to shoot)
  const shootBtn = document.getElementById('btn-shoot');
  if (shootBtn) {
    shootBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      shootBtn.classList.add('pressed');
      fireKey('Space', 'keydown');
    }, { passive: false });

    shootBtn.addEventListener('touchend', e => {
      e.preventDefault();
      shootBtn.classList.remove('pressed');
      fireKey('Space', 'keyup');
    }, { passive: false });

    shootBtn.addEventListener('touchcancel', e => {
      e.preventDefault();
      shootBtn.classList.remove('pressed');
      fireKey('Space', 'keyup');
    }, { passive: false });
  }

  // Pass button = Shift
  const passBtn = document.getElementById('btn-pass');
  if (passBtn) {
    passBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      passBtn.classList.add('pressed');
      const ev = new KeyboardEvent('keydown', { code: 'ShiftLeft', key: 'Shift', shiftKey: true, bubbles: true });
      document.dispatchEvent(ev);
    }, { passive: false });

    passBtn.addEventListener('touchend', e => {
      e.preventDefault();
      passBtn.classList.remove('pressed');
      const ev = new KeyboardEvent('keyup', { code: 'ShiftLeft', key: 'Shift', shiftKey: false, bubbles: true });
      document.dispatchEvent(ev);
    }, { passive: false });
  }

  // Story screen: tap anywhere advances dialogue (already handled by game)
  // But prevent double-fire on touch controls area
  document.getElementById('touch-controls').addEventListener('touchstart', e => {
    e.stopPropagation();
  });

  // Hide controls on non-game screens, show on game screen
  const observer = new MutationObserver(() => {
    const gameActive = document.getElementById('scr-game')?.classList.contains('active');
    const controls = document.getElementById('touch-controls');
    if (controls) {
      controls.style.display = gameActive ? '' : 'none';
    }
  });

  document.querySelectorAll('.screen').forEach(s => {
    observer.observe(s, { attributes: true, attributeFilter: ['class'] });
  });

  // Initial state
  const controls = document.getElementById('touch-controls');
  if (controls) controls.style.display = 'none';
})();
</script>
