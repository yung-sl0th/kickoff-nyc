<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>El Camino — Road to Mexico 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--yellow:#f5c518;--mxgreen:#006847;--mxred:#CE1126;--font-title:'Bangers',cursive;--font-body:'Nunito',sans-serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--font-body);}
#game{width:100vw;height:100vh;position:relative;}
.screen{position:absolute;inset:0;display:none;overflow:hidden;}
.screen.active{display:flex;}

/* TITLE */
#scr-title{background:linear-gradient(180deg,#020c18 0%,#0d2b0d 55%,#1e6e1e 100%);flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.t-stars{position:absolute;inset:0;pointer-events:none;}
.t-star{position:absolute;background:#fff;border-radius:50%;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
.t-flag{font-size:72px;animation:tbounce 1.2s ease-in-out infinite alternate;position:relative;z-index:1;}
@keyframes tbounce{from{transform:translateY(0)}to{transform:translateY(-14px)}}
.t-main{font-family:var(--font-title);font-size:clamp(50px,9vw,96px);color:var(--yellow);letter-spacing:5px;text-shadow:4px 4px 0 var(--mxred),8px 8px 0 #000;text-align:center;line-height:1;position:relative;z-index:1;}
.t-sub{font-family:var(--font-title);font-size:clamp(16px,2.8vw,26px);color:#fff;letter-spacing:5px;text-shadow:2px 2px 0 #000;position:relative;z-index:1;}
.t-world{font-family:var(--font-title);font-size:clamp(13px,2vw,20px);color:var(--yellow);letter-spacing:3px;position:relative;z-index:1;}
.t-btn{padding:16px 48px;font-family:var(--font-title);font-size:26px;letter-spacing:3px;background:var(--mxgreen);color:#fff;border:4px solid var(--yellow);border-radius:50px;cursor:pointer;position:relative;z-index:2;margin-top:8px;animation:pulse 1.6s ease-in-out infinite;transition:transform .1s;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,197,24,.5)}50%{box-shadow:0 0 0 14px rgba(245,197,24,0)}}
.t-btn:hover{transform:scale(1.06);}
.t-player{position:absolute;bottom:0;left:50%;transform:translateX(-50%);font-size:72px;animation:prun .55s ease-in-out infinite alternate;z-index:1;}
@keyframes prun{from{transform:translateX(-50%) translateY(0)}to{transform:translateX(-50%) translateY(-8px)}}
.t-ground{position:absolute;bottom:0;left:0;right:0;height:5px;background:var(--yellow);}

/* STORY */
#scr-story{flex-direction:column;background:#000;}
#s-canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0;}
.s-box{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:92%;max-width:800px;background:rgba(4,8,22,.97);border:3px solid var(--yellow);border-radius:18px;padding:16px 24px;z-index:10;box-shadow:0 0 30px rgba(245,197,24,0.25);}
.s-speaker{font-family:var(--font-title);font-size:21px;color:var(--yellow);letter-spacing:2px;margin-bottom:6px;text-shadow:0 0 10px rgba(245,197,24,0.5);}
.s-text{font-size:clamp(13px,2.2vw,17px);color:#f0f0f0;line-height:1.7;min-height:52px;}
.s-prompt{text-align:right;font-size:12px;color:var(--yellow);margin-top:8px;animation:blink .9s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* TRANSITION */
#scr-transition{background:#000;align-items:center;justify-content:center;}
.tr-box{text-align:center;}
.tr-icon{font-size:76px;}
.tr-title{font-family:var(--font-title);font-size:clamp(28px,5.5vw,60px);color:var(--yellow);letter-spacing:4px;margin-top:12px;}
.tr-sub{font-size:16px;color:#aaa;margin-top:8px;}
.tr-bar-wrap{width:280px;height:14px;background:#222;border-radius:7px;margin:18px auto 0;border:2px solid var(--yellow);}
.tr-bar{height:100%;background:linear-gradient(90deg,var(--mxgreen),var(--yellow));border-radius:5px;width:0%;}

/* GAME */
#scr-game{flex-direction:column;}
.g-hud{flex-shrink:0;height:56px;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:3px solid var(--yellow);z-index:10;}
.g-hud-title{font-family:var(--font-title);font-size:20px;color:var(--yellow);letter-spacing:2px;}
.g-hud-score{font-family:var(--font-title);font-size:24px;color:#fff;}
.g-hud-timer{font-family:var(--font-title);font-size:24px;color:var(--yellow);}
.g-canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;}
canvas{display:block;}
.g-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:2px solid var(--yellow);border-radius:10px;padding:8px 18px;font-size:13px;color:#fff;white-space:nowrap;z-index:5;pointer-events:none;}
.kb{display:inline-block;background:var(--yellow);color:#000;border-radius:5px;padding:1px 7px;font-weight:700;font-size:12px;margin:0 2px;}

/* MAP */
#scr-map{background:#060f22;align-items:center;justify-content:center;flex-direction:column;}
.map-title{font-family:var(--font-title);font-size:clamp(22px,4vw,40px);color:var(--yellow);letter-spacing:3px;margin-bottom:12px;}

/* RESULT */
#scr-result{background:#060f22;align-items:center;justify-content:center;}
.res-box{text-align:center;padding:36px 30px;background:rgba(0,0,0,.65);border:4px solid var(--yellow);border-radius:22px;max-width:480px;width:92%;}
.res-emoji{font-size:72px;animation:popIn .5s cubic-bezier(.36,1.5,.64,1);}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.res-title{font-family:var(--font-title);font-size:44px;margin:8px 0;letter-spacing:3px;}
.res-stars{display:flex;justify-content:center;gap:8px;margin:8px 0;font-size:32px;}
.res-score{font-family:var(--font-title);font-size:32px;color:var(--yellow);margin:6px 0;}
.res-msg{font-size:15px;color:#ccc;line-height:1.6;margin:10px 0;}
.res-btns{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
.res-btn{padding:12px 36px;font-family:var(--font-title);font-size:20px;letter-spacing:2px;border:3px solid;border-radius:36px;cursor:pointer;transition:transform .1s;}
.res-btn:hover{transform:scale(1.05);}
.res-cont{background:var(--mxgreen);color:#fff;border-color:var(--yellow);}
.res-retry{background:var(--mxred);color:#fff;border-color:#ff7766;}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--yellow);color:#000;font-family:var(--font-title);font-size:20px;letter-spacing:2px;padding:10px 28px;border-radius:36px;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s;white-space:nowrap;}
#toast.show{opacity:1;}


.ke-features{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
.ke-feature{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);font-size:11px;padding:4px 10px;border-radius:20px;}

/* ── MOBILE TOUCH CONTROLS ── */
#touch-controls {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  border-top: 2px solid rgba(245,197,24,0.3);
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* ── PORTRAIT: game fills screen minus controls ── */
@media (max-width: 899px) and (orientation: portrait) {
  html, body {
    overflow: hidden;
    background: #000;
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
  }

  #game {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    right: 0 !important;
    bottom: 120px !important;
    width: 100vw !important;
    height: calc(100% - 120px) !important;
    overflow: hidden;
  }

  .screen {
    position: absolute !important;
    inset: 0 !important;
    width: 100% !important;
    height: 100% !important;
  }

  /* Compact story box so it doesn't cover the scene */
  .s-box {
    bottom: 6px !important;
    padding: 10px 14px !important;
  }

  .s-text {
    font-size: 13px !important;
    min-height: 32px !important;
    line-height: 1.5 !important;
  }

  #touch-controls {
    display: flex !important;
    position: fixed !important;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 10px;
    height: 120px;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.97);
    border-top: 2px solid rgba(245,197,24,0.35);
    z-index: 9999;
    box-sizing: border-box;
  }
}

/* ── LANDSCAPE: game fills left, controls on right ── */
@media (max-width: 899px) and (orientation: landscape) {
  html, body { overflow: hidden; background: #000; }

  #game {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    right: 150px !important; bottom: 0 !important;
    width: calc(100vw - 150px) !important;
    height: 100dvh !important;
    overflow: hidden;
  }

  #touch-controls {
    display: flex !important;
    position: fixed !important;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    top: 0; right: 0; bottom: 0;
    width: 150px;
    background: rgba(0,0,0,0.97);
    border-left: 2px solid rgba(245,197,24,0.35);
    z-index: 500;
    padding: 12px 8px;
  }
}

/* ── DESKTOP: hide touch controls ── */
@media (min-width: 900px) {
  #touch-controls { display: none !important; }
}

/* D-pad */
.dpad {
  display: grid;
  grid-template-columns: 48px 48px 48px;
  grid-template-rows: 48px 48px 48px;
  gap: 4px;
  flex-shrink: 0;
}

.dpad-btn {
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  border-radius: 12px;
  color: #fff;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.08s;
  touch-action: none;
}

.dpad-btn:active, .dpad-btn.pressed {
  background: rgba(245,197,24,0.45);
  border-color: #f5c518;
}

.dpad-center { background: transparent; border: none; }

/* Action buttons */
.action-btns {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
  flex-shrink: 0;
}

.action-btn {
  border-radius: 50%;
  border: 3px solid;
  font-family: 'Bangers', cursive;
  font-size: 14px;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.08s, background 0.08s;
  touch-action: none;
}

.action-btn:active { transform: scale(0.9); }

.btn-shoot {
  width: 64px; height: 64px;
  background: rgba(0,104,71,0.5);
  border-color: #00a060;
  color: #fff;
  box-shadow: 0 0 12px rgba(0,160,96,0.3);
}

.btn-shoot.pressed { background: #006847; }

.btn-pass {
  width: 52px; height: 52px;
  background: rgba(206,17,38,0.4);
  border-color: #CE1126;
  color: #fff;
  box-shadow: 0 0 10px rgba(206,17,38,0.3);
}

.btn-pass.pressed { background: #CE1126; }

/* Rotate hint — portrait only */
.rotate-hint {
  display: none;
  position: fixed;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  color: rgba(255,255,255,0.7);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 20px;
  z-index: 600;
  pointer-events: none;
  white-space: nowrap;
  border: 1px solid rgba(245,197,24,0.2);
}

/* Only show rotate hint during gameplay in portrait */
@media (max-width: 899px) and (orientation: portrait) {
  .rotate-hint { display: block; }
}
@media (orientation: landscape) {
  .rotate-hint { display: none !important; }
}

</style>
</head>
<body>
<div id="game">

<div id="scr-title" class="screen active">
  <div class="t-stars" id="t-stars"></div>
  <div class="t-flag">🇲🇽</div>
  <div class="t-main">EL CAMINO</div>
  <div class="t-sub">ROAD TO MEXICO 2026</div>
  <div class="t-world">⚽ FIFA WORLD CUP 2026 ⚽</div>
  <button class="t-btn" id="start-btn">¡KICK OFF!</button>
  <div class="t-player">🧑</div>
  <div class="t-ground"></div></div>

<div id="scr-story" class="screen">
  <canvas id="s-canvas"></canvas>
  <div class="s-box">
    <div class="s-speaker" id="s-speaker"></div>
    <div class="s-text" id="s-text"></div>
    <div class="s-prompt">[ SPACE or TAP to continue ]</div>
  </div>
</div>

<div id="scr-transition" class="screen">
  <div class="tr-box">
    <div class="tr-icon" id="tr-icon">⚽</div>
    <div class="tr-title" id="tr-title">LOADING</div>
    <div class="tr-sub" id="tr-sub"></div>
    <div class="tr-bar-wrap"><div class="tr-bar" id="tr-bar"></div></div>
  </div>
</div>

<div id="scr-game" class="screen">
  <div class="g-hud">
    <div class="g-hud-title" id="g-title">⚽ GAME</div>
    <div class="g-hud-score" id="g-score">0</div>
    <div class="g-hud-timer" id="g-timer">30s</div>
    <button id="skip-btn" onclick="endGame()" style="padding:4px 14px;font-family:var(--font-title);font-size:14px;letter-spacing:1px;background:rgba(0,0,0,.6);color:#f5c518;border:2px solid #f5c518;border-radius:20px;cursor:pointer;margin-left:8px;">SKIP ⏭</button>
  </div>
  <div class="g-canvas-wrap" id="g-wrap">
    <canvas id="g-canvas"></canvas>
    <div class="g-hint" id="g-hint"></div>
  </div>
</div>

<div id="scr-map" class="screen">
  <div class="map-title">⚽ YOUR CAREER PATH ⚽</div>
  <canvas id="m-canvas"></canvas>
</div>

<div id="scr-result" class="screen">
  <div class="res-box">
    <div class="res-emoji" id="r-emoji">🏆</div>
    <div class="res-title" id="r-title">GREAT!</div>
    <div class="res-stars" id="r-stars"></div>
    <div class="res-score" id="r-score">0</div>
    <div class="res-msg" id="r-msg"></div>
    <div class="res-btns">
      <button class="res-btn res-cont" id="r-cont">CONTINUE ➔</button>
      <button class="res-btn res-retry" id="r-retry">RETRY ↺</button>
    </div>
  </div>
</div>

</div>
<div id="toast"></div>

<script>
// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}
const $ = id => document.getElementById(id);
const keys = {};
let storySpaceBlocked = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  // Story screen: Space advances dialogue
  if ($('scr-story').classList.contains('active')) {
    if (e.code === 'Space') { e.preventDefault(); if (!storySpaceBlocked) onSpacePress(); }
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  } else if ($('scr-game').classList.contains('active')) {
    // Game screens: just prevent scroll, let game capture-phase handlers fire first
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  }
});
document.addEventListener('keyup', e => { delete keys[e.code]; });
document.addEventListener('pointerup', () => {
  if (!storySpaceBlocked && $('scr-story').classList.contains('active')) onSpacePress();
});

function onSpacePress() {
  if ($('scr-story').classList.contains('active')) advanceStory();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

// Toast
let toastTm;
function showToast(msg) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTm); toastTm = setTimeout(() => t.classList.remove('show'), 1800);
}

// Title stars
(function() {
  const c = $('t-stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div'); s.className = 't-star';
    const sz = 1 + Math.random()*2.5;
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*65}%;width:${sz}px;height:${sz}px;animation:twinkle ${1+Math.random()*2}s ${Math.random()*2}s infinite;`;
    c.appendChild(s);
  }
})();

// State
let chapterIdx = 0;
let gameScore = 0;
let gameActive = false;
let gameRAF = null;
let timerInt = null;
let timeLeft = 30;
let skills = { dribble:0, shooting:0, passing:0, fitness:0, teamwork:0 };
let currentChapter = null;
let afterGameCb = null;
let afterStoryCb = null;

const CHAPTERS = [
  {
    mapLabel:'Small Town\nOaxaca', mapIcon:'🏠', mapColor:'#c8844a',
    preStory:[
      {speaker:'NARRATOR',portrait:'📖',sky:'#d4622a',ground:'#8B5e14',scene:'village',text:'Oaxaca, Mexico. 2024. A dusty backstreet where every kid grows up kicking a ball against the wall. One of those kids is YOU.'},
      {speaker:'ABUELA',portrait:'👵',sky:'#d4622a',ground:'#7a5010',scene:'village',text:'"¡Mijo! You have been kicking that ball since before you could walk! Go practice before dinner — and don\'t break my window again!"'},
      {speaker:'MIGUEL (You)',portrait:'🧒',sky:'#cc5520',ground:'#6a4008',scene:'village',text:'"I\'m going to play for El Tri one day, Abuela. I can feel it!" You grab the ball and head to the alley. Time to train...'},
    ],
    game:{type:'dribble',label:'⚽ STREET DRIBBLE',hint:'<span class="kb">↑↓←→</span> Dribble &nbsp; <span class="kb">SHIFT</span> Tackle &nbsp; <span class="kb">SPACE</span> Shoot through gates!',target:5,time:35},
    postStory:[
      {speaker:'DON RUFINO',portrait:'👴',sky:'#cc5520',ground:'#6a4008',scene:'village',text:'"¡Oye! I\'m the coach at Escuela Benito Juárez. I saw what you just did. Do you want to try out for the school team, son?"'},
      {speaker:'MIGUEL (You)',portrait:'🧒',sky:'#b84410',ground:'#5a3008',scene:'village',text:'"¡Sí señor! ¡Con todo!" You sprint home to tell Abuela. She kisses your forehead. "I already knew," she says.'},
    ],
    skillGain:{dribble:25},
  },
  {
    mapLabel:'School Team\nBenito Juárez', mapIcon:'🏫', mapColor:'#2e7d52',
    preStory:[
      {speaker:'NARRATOR',portrait:'📖',sky:'#3a90c8',ground:'#2e7d52',scene:'school',text:'Two weeks later. Tryouts at Escuela Benito Juárez. 32 kids showed up. Only 11 make the squad. Coach Rufino watches every single touch.'},
      {speaker:'DON RUFINO',portrait:'👴',sky:'#3a90c8',ground:'#2e7d52',scene:'school',text:'"Step up and shoot — one by one. I want accuracy, power, and composure under pressure. Remember: a miss is just a lesson. ¡Ánimo!"'},
      {speaker:'MIGUEL (You)',portrait:'🧒',sky:'#2a80b8',ground:'#256840',scene:'school',text:'Your heart is hammering. You step to the penalty spot. The goal looks tiny. You breathe slowly... and focus on the bottom corner.'},
    ],
    game:{type:'shooting',label:'⚽ 3v3 SCHOOL MATCH',hint:'<span class="kb">↑↓←→</span> Move &nbsp; <span class="kb">SHIFT</span> Pass &nbsp; <span class="kb">SPACE</span>(hold) Shoot &nbsp; 🖱 Aim',target:3,time:90},
    postStory:[
      {speaker:'DON RUFINO',portrait:'👴',sky:'#2a80b8',ground:'#1e5a34',scene:'school',text:'"You made the team. But this is only the start. Every day after school — training. No excuses. ¿Entendido?"'},
      {speaker:'TEAMMATE SOFÍA',portrait:'👧',sky:'#2070a0',ground:'#184a2a',scene:'school',text:'"Hey, I\'m Sofía — left wing. Welcome to the squad, show-off! Don\'t let it go to your head... yet!" She winks.'},
    ],
    skillGain:{shooting:22,teamwork:14},
  },
  {
    mapLabel:'Club Fuerte\nOaxaca', mapIcon:'🏟️', mapColor:'#006847',
    preStory:[
      {speaker:'NARRATOR',portrait:'📖',sky:'#6ab0e0',ground:'#145a28',scene:'stadium',text:'One year later. Your school team reaches the regional finals. A scout from Club Fuerte Oaxaca has been watching you for three games.'},
      {speaker:'SCOUT HERRERA',portrait:'🕵️',sky:'#6ab0e0',ground:'#145a28',scene:'stadium',text:'"I need to see how you handle pressure. Can you keep the ball when two defenders are closing you down? Prove it."'},

let sceneRAF = null;

function stopScene() {
  if (sceneRAF) { cancelAnimationFrame(sceneRAF); sceneRAF = null; }

// ── SCENE RENDERERS (one per chapter environment) ──
const SCENES = {};

// Helper: draw pixel-art style character
function drawCharacter(ctx, x, y, scale, type, t, action) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);
  const bob = Math.sin(t * 2) * 2;
  const legSwing = Math.sin(t * 4) * 8;
  const armSwing = Math.sin(t * 4 + Math.PI) * 10;

  if (type === 'miguel') {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(0, 38 + bob, 18, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Legs with walk animation
    ctx.fillStyle = '#fff';
    ctx.fillRect(-10, 18 + bob, 9, 22);
    ctx.fillRect(1, 18 + bob, 9, 22);
    // Boots
    ctx.fillStyle = '#222';
    ctx.fillRect(-12, 36 + bob, 12, 6);
    ctx.fillRect(0, 36 + bob, 12, 6);
    // Shorts white stripe
    ctx.fillStyle = '#e0e0e0';
    ctx.fillRect(-11, 17 + bob, 22, 5);
    // Shirt #10 Mexico green
    ctx.fillStyle = '#006847';
    ctx.fillRect(-12, -2 + bob, 24, 22);
    // Arms
    ctx.fillStyle = '#006847';
    ctx.save(); ctx.translate(-12, 4 + bob);
    ctx.rotate(armSwing * Math.PI / 180);
    ctx.fillRect(-6, 0, 7, 16); ctx.restore();
    ctx.save(); ctx.translate(12, 4 + bob);
    ctx.rotate(-armSwing * Math.PI / 180);
    ctx.fillRect(0, 0, 7, 16); ctx.restore();
    // Neck
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(-5, -8 + bob, 10, 10);
    // Head
    ctx.fillStyle = '#c8a060';
    ctx.fillRect(-14, -30 + bob, 28, 24);
    // Hair dark
    ctx.fillStyle = '#3a1800';
    ctx.fillRect(-14, -30 + bob, 28, 8);
    ctx.fillRect(-14, -22 + bob, 4, 6);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(-9, -22 + bob, 6, 5);
    ctx.fillRect(3, -22 + bob, 6, 5);
    ctx.fillStyle = '#2a1800';
    ctx.fillRect(-7, -21 + bob, 4, 3);
    ctx.fillRect(5, -21 + bob, 4, 3);
    // Smile
    ctx.fillStyle = '#c8703a';
    ctx.fillRect(-5, -14 + bob, 10, 2);
    ctx.fillRect(-5, -12 + bob, 2, 2);
    ctx.fillRect(3, -12 + bob, 2, 2);
    // Ball at feet (optional)
    if (action === 'kick') {
      const bx = 18 + Math.sin(t * 3) * 5;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(bx, 40 + bob, 8, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(bx, 40 + bob, 3, 0, Math.PI * 2); ctx.fill();
    }
    if (action === 'wave') {
      ctx.fillStyle = '#006847';
      ctx.save(); ctx.translate(12, 4 + bob);
      ctx.rotate((-45 + Math.sin(t * 3) * 20) * Math.PI / 180);
      ctx.fillRect(0, 0, 7, 16); ctx.restore();
    }
    if (action === 'celebrate') {
      ctx.fillStyle = '#006847';
      const armR = (-80 + Math.sin(t * 4) * 15) * Math.PI / 180;
      ctx.save(); ctx.translate(-12, 4 + bob);
      ctx.rotate(-armR); ctx.fillRect(-6, 0, 7, 16); ctx.restore();
      ctx.save(); ctx.translate(12, 4 + bob);
      ctx.rotate(armR); ctx.fillRect(0, 0, 7, 16); ctx.restore();
    }
  }

  if (type === 'abuela') {
    // old woman, shorter, shawl
    const b2 = Math.sin(t * 1.5) * 1.5;
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 30 + b2, 16, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#6b4f2a'; // dress
    ctx.fillRect(-12, 4 + b2, 24, 28);
    ctx.fillStyle = '#8b6a3a'; // shawl
    ctx.beginPath(); ctx.moveTo(-18, 2 + b2); ctx.lineTo(18, 2 + b2); ctx.lineTo(14, 18 + b2); ctx.lineTo(-14, 18 + b2); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#c8a060'; // neck
    ctx.fillRect(-5, -6 + b2, 10, 10);
    ctx.fillStyle = '#c8a060'; // head
    ctx.fillRect(-12, -26 + b2, 24, 22);
    ctx.fillStyle = '#ddd'; // white hair
    ctx.fillRect(-12, -26 + b2, 24, 8);
    ctx.fillStyle = '#ddd';
    ctx.fillRect(-14, -18 + b2, 4, 8);
    ctx.fillRect(10, -18 + b2, 4, 8);
    ctx.fillStyle = '#fff'; ctx.fillRect(-7,-18+b2,5,4); ctx.fillRect(2,-18+b2,5,4);
    ctx.fillStyle = '#5a3010'; ctx.fillRect(-5,-17+b2,3,2); ctx.fillRect(3,-17+b2,3,2);
    ctx.fillStyle = '#c87050'; ctx.fillRect(-4,-11+b2,8,2);
    // cane
    ctx.fillStyle = '#8b5a30'; ctx.fillRect(14, -2 + b2, 3, 35);
    ctx.fillRect(10, -4 + b2, 9, 4);
    if (action === 'wave') {
      ctx.save(); ctx.translate(-12, 2 + b2);
      ctx.rotate((-40 + Math.sin(t * 4) * 25) * Math.PI / 180);
      ctx.fillStyle = '#8b6a3a'; ctx.fillRect(-6, 0, 8, 14); ctx.restore();
    }
  }

  if (type === 'coach') {
    const b2 = Math.sin(t * 1.8) * 1.5;
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(0, 38 + b2, 17, 5, 0, 0, Math.PI * 2); ctx.fill();
    // Pants
    ctx.fillStyle = '#2a2a5a'; ctx.fillRect(-11, 16+b2, 10, 24); ctx.fillRect(1, 16+b2, 10, 24);
    ctx.fillStyle = '#111'; ctx.fillRect(-13, 36+b2, 12, 6); ctx.fillRect(0, 36+b2, 12, 6);
    // Body tracksuit blue
    ctx.fillStyle = '#1a4a8a'; ctx.fillRect(-13, -4+b2, 26, 22);
    ctx.fillStyle = '#fff'; ctx.fillRect(-2,-4+b2,4,22); // stripe
    // Arms
    ctx.fillStyle = '#1a4a8a';
    ctx.save(); ctx.translate(-13, 2+b2); ctx.rotate((armSwing*.6)*Math.PI/180); ctx.fillRect(-6,0,7,16); ctx.restore();
    ctx.save(); ctx.translate(13, 2+b2); ctx.rotate((-armSwing*.6)*Math.PI/180); ctx.fillRect(0,0,7,16); ctx.restore();
    // Clipboard
    ctx.fillStyle = '#ddd'; ctx.fillRect(14, -2+b2, 12, 18);
    ctx.fillStyle = '#888'; ctx.fillRect(15,1+b2,10,2); ctx.fillRect(15,5+b2,8,2); ctx.fillRect(15,9+b2,9,2);
    // Neck + head
    ctx.fillStyle = '#c8a060'; ctx.fillRect(-5,-8+b2,10,10);
    ctx.fillRect(-13,-30+b2,26,24);
    ctx.fillStyle = '#5a3a10'; ctx.fillRect(-13,-30+b2,26,7); // cap brim
    ctx.fillRect(-16,-25+b2,5,8); // cap sides
    ctx.fillRect(11,-25+b2,5,8);
    ctx.fillStyle = '#1a4a8a'; ctx.fillRect(-12,-30+b2,24,6); // cap top
    ctx.fillStyle = '#fff'; ctx.fillRect(-8,-22+b2,5,4); ctx.fillRect(3,-22+b2,5,4);
    ctx.fillStyle = '#2a1800'; ctx.fillRect(-6,-21+b2,3,2); ctx.fillRect(4,-21+b2,3,2);
    ctx.fillStyle = '#c87050'; ctx.fillRect(-4,-14+b2,8,2);
  }

  if (type === 'scout') {
    const b2 = Math.sin(t*2)*2;
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath();ctx.ellipse(0,38+b2,17,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2a'; ctx.fillRect(-11,16+b2,10,24); ctx.fillRect(1,16+b2,10,24);
    ctx.fillStyle='#111'; ctx.fillRect(-13,36+b2,12,6); ctx.fillRect(0,36+b2,12,6);
    ctx.fillStyle='#1a1a2a'; ctx.fillRect(-13,-4+b2,26,22);
    ctx.fillStyle='#fff'; ctx.fillRect(-12,2+b2,26,2);
    ctx.fillStyle='#cc2200'; ctx.fillRect(-4,-8+b2,8,6);
    ctx.fillStyle='#c8a060'; ctx.fillRect(-5,-8+b2,10,8);
    ctx.fillRect(-13,-30+b2,26,24);
    ctx.fillStyle='#1a1a2a'; ctx.fillRect(-13,-30+b2,26,7);
    ctx.fillStyle='#fff'; ctx.fillRect(-8,-22+b2,5,4); ctx.fillRect(3,-22+b2,5,4);
    ctx.fillStyle='#2a1800'; ctx.fillRect(-6,-21+b2,3,2); ctx.fillRect(4,-21+b2,3,2);
    // notepad
    if(action==='point'){ctx.fillStyle='#f5f5dc';ctx.fillRect(14,-5+b2,11,16);ctx.fillStyle='#666';ctx.fillRect(15,-2+b2,9,2);ctx.fillRect(15,3+b2,7,2);}
  }

  if (type === 'director') {
    const b2 = Math.sin(t*1.6)*1.5;
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,38+b2,17,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#2a2a2a';ctx.fillRect(-11,16+b2,10,24);ctx.fillRect(1,16+b2,10,24);
    ctx.fillStyle='#111';ctx.fillRect(-13,36+b2,12,6);ctx.fillRect(0,36+b2,12,6);
    ctx.fillStyle='#1a1a1a';ctx.fillRect(-13,-4+b2,26,22);
    ctx.fillStyle='#f5c518';ctx.fillRect(-12,2+b2,4,16);
    ctx.fillStyle='#f5c518';ctx.fillRect(8,2+b2,4,16);
    ctx.fillStyle='#f5c518';ctx.fillRect(-4,0+b2,8,4);
    ctx.fillStyle='#c8a060';ctx.fillRect(-5,-8+b2,10,8);
    ctx.fillRect(-13,-30+b2,26,24);
    ctx.fillStyle='#2a1a00';ctx.fillRect(-13,-30+b2,26,8);
    ctx.fillStyle='#fff';ctx.fillRect(-8,-21+b2,5,4);ctx.fillRect(3,-21+b2,5,4);
    ctx.fillStyle='#2a1800';ctx.fillRect(-6,-20+b2,3,2);ctx.fillRect(4,-20+b2,3,2);
  }

  ctx.restore();
}

// ── SCENE: VILLAGE (Oaxaca sunset alley) ─────────
SCENES.village = function(ctx, W, H, t, variant) {
  // Sky — warm sunset gradient
  const skyG = ctx.createLinearGradient(0, 0, 0, H * 0.62);
  skyG.addColorStop(0, '#1a0a00');
  skyG.addColorStop(0.3, '#8b2200');
  skyG.addColorStop(0.7, '#e05a10');
  skyG.addColorStop(1, '#f5a030');
  ctx.fillStyle = skyG; ctx.fillRect(0, 0, W, H * 0.62);

  // Sun on horizon
  const sunX = W * 0.75, sunY = H * 0.52;
  const sunG = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 80);
  sunG.addColorStop(0, '#fff8a0'); sunG.addColorStop(0.3, '#f5c518'); sunG.addColorStop(1, 'rgba(245,140,0,0)');
  ctx.fillStyle = sunG; ctx.beginPath(); ctx.arc(sunX, sunY, 80, 0, Math.PI * 2); ctx.fill();

  // Distant mountains silhouette
  ctx.fillStyle = '#3a0e00';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.56);
  [0,.1,.18,.28,.4,.52,.65,.75,.85,.95,1].forEach((fx, i) => {
    const hy = H * (0.40 + Math.sin(i * 1.7 + 0.5) * 0.1 + (i % 2) * 0.04);
    ctx.lineTo(fx * W, hy);
  });
  ctx.lineTo(W, H * 0.62); ctx.lineTo(0, H * 0.62); ctx.closePath(); ctx.fill();

  // Ground — cobblestone alley
  const groundG = ctx.createLinearGradient(0, H * 0.62, 0, H);
  groundG.addColorStop(0, '#9a7040'); groundG.addColorStop(1, '#6a4820');
  ctx.fillStyle = groundG; ctx.fillRect(0, H * 0.62, W, H);

  // Cobblestone tiles
  ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1;
  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 16; col++) {
      const tx = (col + (row % 2) * 0.5) * (W / 14);
      const ty = H * 0.63 + row * ((H * 0.37) / 7);
      const tw = W / 14 - 2, th = (H * 0.37) / 7 - 2;
      ctx.strokeRect(tx, ty, tw, th);
    }
  }

  // Background buildings (left side)
  const buildings = [
    {x:0.02,w:0.12,h:0.32,col:'#b87840',roof:'#8b2200'},
    {x:0.14,w:0.09,h:0.26,col:'#c8904a',roof:'#7a1800'},
    {x:0.55,w:0.14,h:0.30,col:'#a86830',roof:'#8b2200'},
    {x:0.70,w:0.10,h:0.22,col:'#b87840',roof:'#7a1800'},
    {x:0.81,w:0.18,h:0.28,col:'#c8904a',roof:'#8b2200'},
  ];
  buildings.forEach(b => {
    const bx = b.x * W, bw = b.w * W, bh = b.h * H;
    const by = H * 0.62 - bh;
    ctx.fillStyle = b.col; ctx.fillRect(bx, by, bw, bh);
    // Roof triangle
    ctx.fillStyle = b.roof;
    ctx.beginPath(); ctx.moveTo(bx - 4, by); ctx.lineTo(bx + bw / 2, by - bh * 0.25); ctx.lineTo(bx + bw + 4, by); ctx.closePath(); ctx.fill();
    // Windows
    ctx.fillStyle = '#f5c518'; ctx.globalAlpha = 0.8 + Math.sin(t + b.x * 5) * 0.2;
    ctx.fillRect(bx + bw * 0.2, by + bh * 0.2, bw * 0.25, bh * 0.2);
    ctx.fillRect(bx + bw * 0.55, by + bh * 0.2, bw * 0.25, bh * 0.2);
    ctx.globalAlpha = 1;
    // Door
    ctx.fillStyle = '#4a2800'; ctx.fillRect(bx + bw * 0.35, by + bh * 0.62, bw * 0.3, bh * 0.38);
  });

  // Agave / cactus plants
  [[0.25, 0.62], [0.48, 0.62], [0.88, 0.62]].forEach(([fx, fy]) => {
    const cx = fx * W, cy = fy * H;
    ctx.fillStyle = '#2a6a20';
    // Main trunk
    ctx.fillRect(cx - 4, cy - 40, 8, 40);
    // Arms
    ctx.fillRect(cx - 22, cy - 28, 18, 6); ctx.fillRect(cx - 22, cy - 40, 6, 12);
    ctx.fillRect(cx + 4, cy - 22, 18, 6); ctx.fillRect(cx + 16, cy - 34, 6, 12);
  });

  // Street lamp
  const lampX = W * 0.42, lampY = H * 0.38;
  ctx.fillStyle = '#5a3a10'; ctx.fillRect(lampX - 3, lampY, 6, H * 0.24);
  ctx.fillStyle = '#8b6a30'; ctx.fillRect(lampX - 8, lampY, 16, 8);
  // Lamp glow
  const lampG = ctx.createRadialGradient(lampX, lampY - 5, 0, lampX, lampY - 5, 50);
  lampG.addColorStop(0, 'rgba(255,220,100,0.7)'); lampG.addColorStop(1, 'rgba(255,180,0,0)');
  ctx.fillStyle = lampG; ctx.beginPath(); ctx.arc(lampX, lampY - 5, 50, 0, Math.PI * 2); ctx.fill();

  // Stars fading in
  ctx.fillStyle = `rgba(255,255,255,${Math.max(0, 0.7 - Math.sin(t * 0.3) * 0.3)})`;
  [[0.08,0.06],[0.15,0.12],[0.32,0.04],[0.45,0.09],[0.62,0.05],[0.78,0.08],[0.9,0.03]].forEach(([fx,fy]) => {
    ctx.beginPath(); ctx.arc(fx*W, fy*H, 1.5+Math.sin(t+fx*10)*0.5, 0, Math.PI*2); ctx.fill();
  });

  // Characters based on variant
  const groundY = H * 0.62;
  if (variant === 0) {
    // Miguel kicking ball in alley
    drawCharacter(ctx, W * 0.38, groundY, 1.4, 'miguel', t, 'kick');
  } else if (variant === 1) {
    // Abuela at doorway waving, Miguel listening
    drawCharacter(ctx, W * 0.25, groundY, 1.3, 'abuela', t, 'wave');
    drawCharacter(ctx, W * 0.5, groundY, 1.4, 'miguel', t, 'wave');
  } else {
    // Miguel running off with ball
    drawCharacter(ctx, W * 0.4 + Math.sin(t) * 5, groundY, 1.4, 'miguel', t, 'kick');
    drawCharacter(ctx, W * 0.18, groundY, 1.3, 'abuela', t, 'wave');
  }
};

// ── SCENE: SCHOOL (Sunny morning, school field) ──
SCENES.school = function(ctx, W, H, t, variant) {
  // Sky — bright blue morning
  const skyG = ctx.createLinearGradient(0, 0, 0, H * 0.60);
  skyG.addColorStop(0, '#0a2a60'); skyG.addColorStop(0.5, '#1a70d0'); skyG.addColorStop(1, '#5ac0f0');
  ctx.fillStyle = skyG; ctx.fillRect(0, 0, W, H * 0.60);

  // Clouds
  [[0.12,0.08,0.9],[0.45,0.12,0.7],[0.72,0.06,0.85],[0.3,0.18,0.6]].forEach(([fx,fy,op]) => {
    ctx.fillStyle = `rgba(255,255,255,${op})`;
    const cx = fx*W + Math.sin(t*0.2+fx*5)*8, cy = fy*H;
    [[0,0,28],[25,-10,22],[50,0,26],[75,-5,20],[-20,-5,18],[90,5,16]].forEach(([ox,oy,r]) => {
      ctx.beginPath(); ctx.arc(cx+ox, cy+oy, r, 0, Math.PI*2); ctx.fill();
    });
  });

// ── SCENE: NATIONAL (World Cup Azteca, epic night) ─
SCENES.national = function(ctx, W, H, t, variant) {
  // Ultimate deep night — very dramatic
  const skyG=ctx.createLinearGradient(0,0,0,H*.5);
  skyG.addColorStop(0,'#000005');skyG.addColorStop(0.7,'#020218');skyG.addColorStop(1,'#050530');

  // Many stars
  for(let i=0;i<80;i++){
    const sx=(i*137+20)%W,sy=(i*89)%(H*.45);

    ctx.fillStyle=`rgba(255,255,255,${br})`;
    ctx.beginPath();ctx.arc(sx,sy,1+Math.random()*.8,0,Math.PI*2);ctx.fill();
  }

  // Fireworks (variants 2,3 — post goal)
  if(variant>=2){
    [[.2,.15],[.5,.08],[.78,.18],[.35,.12],[.65,.1]].forEach(([fx,fy],fi)=>{
      const fc=['#f5c518','#CE1126','#006847','#fff','#ff8800'][fi];
      const phase=(t*.8+fi*.6)%(Math.PI*2);
      const r=20+30*Math.sin(phase*.5);
      for(let j=0;j<10;j++){
        const a=j*(Math.PI*2/10);
        const tr=r*(0.7+Math.sin(phase)*0.3);
        ctx.fillStyle=fc;ctx.globalAlpha=.8*Math.sin(phase*.5+.5);
        ctx.beginPath();ctx.arc(fx*W+Math.cos(a)*tr,fy*H+Math.sin(a)*tr,3+Math.sin(phase)*2,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    });
  }

  // Mexico flag colors flash on celebration
  if(variant===3){
    ctx.globalAlpha=.15+.08*Math.sin(t*2);
    ctx.fillStyle='#006847';ctx.fillRect(0,0,W/3,H);
    ctx.fillStyle='#fff';ctx.fillRect(W/3,0,W/3,H);
    ctx.fillStyle='#CE1126';ctx.fillRect(W*2/3,0,W/3,H);
    ctx.globalAlpha=1;
  }

  // Full Azteca — most epic version
  ctx.fillStyle='#a09880';
  ctx.beginPath();ctx.moveTo(0,H*.5);
  ctx.quadraticCurveTo(W*.5,-H*.3,W,H*.5);
  ctx.lineTo(W,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();

  // Dense crowd — full stadium
  for(let i=0;i<300;i++){

    ctx.globalAlpha=.85;ctx.beginPath();ctx.arc(cx2,cy2+wave,2.5+Math.sin(i)*.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Mexican flags waving in crowd
  for(let i=0;i<20;i++){
    const a=Math.PI*1.05+i*(Math.PI*.9/20);
    const r=H*.22;
    const fx2=W*.5+Math.cos(a)*r*2.3;
    const fy2=H*.5+Math.sin(a)*r*.5-r*.4;
    if(fy2>H*.48)continue;
    const flagWave=Math.sin(t*3+i*.8)*6;
    ctx.fillStyle='#006847';ctx.fillRect(fx2,fy2,16,8);
    ctx.fillStyle='#fff';ctx.fillRect(fx2+5,fy2,6,8);
    ctx.fillStyle='#CE1126';ctx.fillRect(fx2+11,fy2,5,8);
    ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(fx2,fy2);ctx.lineTo(fx2,fy2+20);ctx.stroke();
  }

  // Ultra bright pitch
  const pitchG=ctx.createLinearGradient(0,H*.5,0,H);
  pitchG.addColorStop(0,'#50e050');pitchG.addColorStop(.4,'#38b038');pitchG.addColorStop(1,'#208020');
  ctx.fillStyle=pitchG;ctx.fillRect(0,H*.5,W,H);

  // Pitch glow from floodlights
  const glowG=ctx.createRadialGradient(W*.5,H*.5,0,W*.5,H*.5,W*.7);

  ctx.fillStyle=glowG;ctx.fillRect(0,H*.5,W,H);

  // Pitch markings
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=3;
  ctx.strokeRect(W*.04,H*.52,W*.92,H*.44);
  ctx.beginPath();ctx.moveTo(W*.5,H*.5);ctx.lineTo(W*.5,H);ctx.stroke();
  ctx.beginPath();ctx.arc(W*.5,H*.5,H*.09,0,Math.PI*2);ctx.stroke();
  // Penalty box
  ctx.strokeRect(W*.3,H*.5,W*.4,H*.15);
  // Penalty spot
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.beginPath();ctx.arc(W*.5,H*.68,5,0,Math.PI*2);ctx.fill();

  // Mega floodlights
  [[.01,.01],[.99,.01],[.12,.08],[.88,.08]].forEach(([fx,fy])=>{
    const lx=fx*W,ly=fy*H;
    ctx.fillStyle='#555';ctx.fillRect(lx-5,ly,10,H*.45);
    ctx.fillStyle='#ccc';ctx.fillRect(lx-25,ly-10,50,12);
    ctx.globalAlpha=.12;ctx.fillStyle='#ffffd0';
    ctx.beginPath();ctx.moveTo(lx,ly+10);ctx.lineTo(lx-150,H*.85);ctx.lineTo(lx+150,H*.85);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    const g2=ctx.createRadialGradient(lx,ly,0,lx,ly,40);
    g2.addColorStop(0,'rgba(255,255,180,1)');g2.addColorStop(1,'rgba(0,0,0,0)');

  // Characters
  const py=H*.72;
  if(variant===0){
    // Miguel staring at phone — the call

    drawCharacter(ctx,W*.62,py,1.5,'coach',t,'point');
  } else if(variant===1){

    drawCharacter(ctx,W*.6,py,1.5,'coach',t,'point');
  } else if(variant===2){
    drawCharacter(ctx,W*.4,py,1.8,'miguel',t,'celebrate');
    drawCharacter(ctx,W*.62,py,1.5,'abuela',t,'wave');
  } else {
    drawCharacter(ctx,W*.4,py,1.8,'miguel',t,'celebrate');
  }
};

// ── FLOW ─────────────────────────────────────────
function startGame() {
  chapterIdx=0; gameScore=0;
  Object.keys(skills).forEach(k=>skills[k]=0);
  doTransition('⚽','EL CAMINO','A small town. A big dream...', ()=>runChapter(0));
}

function runChapter(idx) {
  chapterIdx=idx;
  const ch=CHAPTERS[idx];
  currentChapter=ch;
  doStory(ch.preStory, ()=>{
    doMap(()=>{
      doMiniGame(ch, score=>{
        if(ch.skillGain) Object.entries(ch.skillGain).forEach(([k,v])=>{skills[k]=Math.min(100,(skills[k]||0)+v);});
        doResult(score, ch.game.target, ()=>{
          doStory(ch.postStory, ()=>{
            if(idx<CHAPTERS.length-1){
              const next=CHAPTERS[idx+1];
              doTransition(next.mapIcon,next.mapLabel.replace('\n',' '),'Next chapter unlocked!',()=>runChapter(idx+1));
            } else {doEnding();}
          });
        });
      });
    });
  });
}

// ── TRANSITION ───────────────────────────────────
function doTransition(icon,title,sub,cb){
  stopScene();
  $('tr-icon').textContent=icon;$('tr-title').textContent=title;$('tr-sub').textContent=sub;
  showScreen('scr-transition');
  const bar=$('tr-bar');bar.style.width='0%';

// ── STORY ENGINE ─────────────────────────────────
let storyBeats=[], storyIdx2=0;
let typTm=null, typPos=0, typFull='', isTyping=false;

function doStory(beats, cb) {
  storyBeats=beats; storyIdx2=0; afterStoryCb=cb;
  storySpaceBlocked=true;
  showScreen('scr-story');
  // Size canvas
  const sc=$('s-canvas');
  sc.width=window.innerWidth; sc.height=window.innerHeight;
  setTimeout(()=>{storySpaceBlocked=false;},500);
  renderBeat(0);
  startScene();
}

function startScene() {
  stopScene();
  sceneT=0;
  function loop(){
    sceneRAF=requestAnimationFrame(loop);
    sceneT+=0.016;
    const sc=$('s-canvas');
    if(!sc||!$('scr-story').classList.contains('active')){stopScene();return;}
    const ctx=sc.getContext('2d');
    ctx.clearRect(0,0,sc.width,sc.height);
    const sceneFn=SCENES[currentScene]||SCENES.village;
    sceneFn(ctx,sc.width,sc.height,sceneT,sceneVariant);
  }
  loop();
}

// Map beat's scene key + variant index
const BEAT_SCENES = {
  village:   {fn:'village', variants:[0,1,2]},
  school:    {fn:'school',  variants:[0,1,2]},
  stadium:   {fn:'stadium', variants:[0,1,2]},
  bigstadium:{fn:'bigstadium',variants:[0,1,2]},
  national:  {fn:'national', variants:[0,1,2,3]},
};

function renderBeat(idx){
  if(idx>=storyBeats.length){
    stopScene();
    const fn=afterStoryCb;afterStoryCb=null;if(fn)fn();return;
  }
  const b=storyBeats[idx];
  const sc=BEAT_SCENES[b.scene]||BEAT_SCENES.village;
  // Only restart scene loop if scene changes
  if(currentScene!==sc.fn){
    currentScene=sc.fn;
    sceneT=0;
  }
  sceneVariant=sc.variants[Math.min(idx,sc.variants.length-1)];
  $('s-speaker').textContent=b.speaker;
  typFull=b.text;typPos=0;isTyping=true;
  $('s-text').textContent='';
  clearTimeout(typTm);typeStep();
}

function typeStep(){
  if(typPos<typFull.length){
    $('s-text').textContent=typFull.slice(0,++typPos);
    typTm=setTimeout(typeStep,22);
  } else {isTyping=false;}
}

function advanceStory(){
  if(isTyping){clearTimeout(typTm);$('s-text').textContent=typFull;isTyping=false;return;}
  storyIdx2++;renderBeat(storyIdx2);
}

// ── MAP ──────────────────────────────────────────
function doMap(cb) {
  stopScene();
  showScreen('scr-map');
  const mc = $('m-canvas');
  const W = Math.min(window.innerWidth-30, 860);
  const H = Math.min(window.innerHeight-110, 420);
  mc.width = W; mc.height = H;
  const ctx = mc.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const pts = CHAPTERS.map((ch,i) => ({
    x: 55 + i*((W-110)/(CHAPTERS.length-1)),
    y: H/2 + Math.sin(i*0.9)*55, ch
  }));
  for (let i=0;i<pts.length-1;i++) {
    ctx.beginPath(); ctx.setLineDash([10,7]);
    ctx.strokeStyle = i<=chapterIdx?'#f5c518':'#2a3a2a';
    ctx.lineWidth=3; ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[i+1].x,pts[i+1].y); ctx.stroke(); ctx.setLineDash([]);
  }
  pts.forEach((p,i) => {
    const cur = i===chapterIdx, unl = i<=chapterIdx;
    if (cur) { ctx.beginPath();ctx.arc(p.x,p.y,34,0,Math.PI*2);ctx.fillStyle='rgba(245,197,24,0.18)';ctx.fill(); }
    ctx.beginPath();ctx.arc(p.x,p.y,25,0,Math.PI*2);
    ctx.fillStyle=cur?p.ch.mapColor:unl?p.ch.mapColor+'99':'#161e16';ctx.fill();
    ctx.strokeStyle=cur?'#f5c518':unl?'#667766':'#2a3a2a';ctx.lineWidth=cur?3:1.5;ctx.stroke();
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.ch.mapIcon,p.x,p.y);
    const lines=p.ch.mapLabel.split('\n');
    ctx.fillStyle=unl?'#ffffff':'#404040';ctx.font=`${Math.max(10,W*0.013)}px Nunito,sans-serif`;
    lines.forEach((ln,li) => ctx.fillText(ln,p.x,p.y+36+li*14));
  });
  const bx=14,by=14,bw=170,bh=135;
  ctx.fillStyle='rgba(0,0,0,0.65)';rr(ctx,bx,by,bw,bh,9);ctx.fill();
  ctx.strokeStyle='#f5c518';ctx.lineWidth=1.5;rr(ctx,bx,by,bw,bh,9);ctx.stroke();
  ctx.fillStyle='#f5c518';ctx.font='bold 12px Nunito,sans-serif';ctx.textAlign='left';ctx.fillText('⚡ SKILLS',bx+10,by+16);
  Object.entries(skills).forEach(([k,v],i) => {
    const sy=by+30+i*19;
    ctx.fillStyle='#aaa';ctx.font='10px Nunito,sans-serif';ctx.fillText(k.charAt(0).toUpperCase()+k.slice(1),bx+10,sy);
    ctx.fillStyle='#1a2a1a';rr(ctx,bx+78,sy-8,78,11,4);ctx.fill();
    ctx.fillStyle=v>60?'#3db33d':v>30?'#f5c518':'#cc2200';rr(ctx,bx+78,sy-8,Math.max(2,78*v/100),11,4);ctx.fill();
  });
  setTimeout(cb, 1600);
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// ── GAME RUNNER ──────────────────────────────────
function doMiniGame(ch, cb) {
  stopScene();
  afterGameCb = cb; gameScore = 0; gameActive = false;
  if (gameRAF) cancelAnimationFrame(gameRAF);
  if (timerInt) clearInterval(timerInt);
  $('g-title').textContent = ch.game.label;
  $('g-score').textContent = '0 / '+ch.game.target;
  $('g-hint').innerHTML = ch.game.hint;
  timeLeft = ch.game.time;
  $('g-timer').textContent = timeLeft+'s';
  const wrap = $('g-wrap');
  const canvas = $('g-canvas');
  canvas.width = wrap.clientWidth || window.innerWidth;
  canvas.height = (wrap.clientHeight || window.innerHeight) - 56;
  showScreen('scr-game');
  setTimeout(() => {
    gameActive = true;
    GAMES[ch.game.type](canvas);
    timerInt = setInterval(() => {
      if (!gameActive) return;
      timeLeft--;
      $('g-timer').textContent = timeLeft+'s';
      if (timeLeft <= 0) endGame();
    }, 1000);
  }, 100);
}

function addScore(n) {
  gameScore += n;
  $('g-score').textContent = gameScore+' / '+currentChapter.game.target;
  if (gameScore >= currentChapter.game.target) { showToast('⭐ TARGET REACHED!'); endGame(); }
}

function endGame() {
  if (!gameActive) return;
  gameActive = false;
  clearInterval(timerInt);
  if (gameRAF) cancelAnimationFrame(gameRAF);
  const score = gameScore, cb = afterGameCb; afterGameCb = null;
  setTimeout(() => { if (cb) cb(score); }, 200);
}

const GAMES = {};

// ── Universal people-drawing (perspective-aware) ─────────────
function drawPerson(ctx, x, y, scale, opts={}) {
  const {shirt='#006847',shorts='#fff',num='',hair='#2a1200',skin='#c8a060',
         boots='#111',highlight=false,moving=false,dir=0,gk=false,label=''} = opts;
  const s = scale;
  const t = Date.now()/160;
  const run = moving ? Math.sin(t*4.5)*11 : 0;
  ctx.save();
  ctx.translate(x, y);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath();ctx.ellipse(0,s*0.08,s*0.55,s*0.16,0,0,Math.PI*2);ctx.fill();
  // Legs
  ctx.strokeStyle=skin;ctx.lineWidth=s*0.26;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-s*.13,-s*.28);ctx.lineTo(-s*.17+run*.01,s*.06);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.13,-s*.28);ctx.lineTo(s*.17-run*.01,s*.06);ctx.stroke();
  // Boots
  ctx.fillStyle=boots;
  ctx.beginPath();ctx.ellipse(-s*.17+run*.01,s*.09,s*.19,s*.08,.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(s*.17-run*.01,s*.09,s*.19,s*.08,-.2,0,Math.PI*2);ctx.fill();
  // Shorts
  ctx.fillStyle=shorts;ctx.beginPath();ctx.roundRect(-s*.28,-s*.32,s*.56,s*.12,s*.05);ctx.fill();
  // Body
  ctx.fillStyle=shirt;ctx.beginPath();ctx.roundRect(-s*.3,-s*1.0,s*.6,s*.7,s*.09);ctx.fill();
  if(highlight){ctx.strokeStyle='#f5c518';ctx.lineWidth=s*.06;ctx.beginPath();ctx.roundRect(-s*.3,-s*1.0,s*.6,s*.7,s*.09);ctx.stroke();}
  // Number
  if(num){ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(8,s*.36)}px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(num,0,-s*.65);}
  // Arms
  const armL=gk?-s*.72:-s*.52, armR=gk?s*.72:s*.52;
  ctx.strokeStyle=shirt;ctx.lineWidth=s*.22;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-s*.3,-s*.82);ctx.lineTo(armL,-s*.42);ctx.stroke();
  ctx.beginPath();ctx.moveTo(s*.3,-s*.82);ctx.lineTo(armR,-s*.42);ctx.stroke();
  if(gk){ctx.fillStyle='#f5c518';ctx.beginPath();ctx.arc(armL,-s*.4,s*.2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(armR,-s*.4,s*.2,0,Math.PI*2);ctx.fill();}
  // Neck
  ctx.fillStyle=skin;ctx.fillRect(-s*.13,-s*1.16,s*.26,s*.18);
  // Head
  ctx.beginPath();ctx.arc(0,-s*1.4,s*.34,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle=hair;ctx.beginPath();ctx.arc(0,-s*1.56,s*.25,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillRect(-s*.34,-s*1.52,s*.08,s*.1);ctx.fillRect(s*.26,-s*1.52,s*.08,s*.1);
  // Eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-s*.12,-s*1.4,s*.09,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s*.12,-s*1.4,s*.09,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-s*.1,-s*1.39,s*.055,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(s*.14,-s*1.39,s*.055,0,Math.PI*2);ctx.fill();
  // Highlight arrow (player indicator)
  if(highlight){
    ctx.fillStyle='rgba(255,255,100,.9)';
    ctx.beginPath();ctx.moveTo(0,-s*2.1);ctx.lineTo(-s*.22,-s*1.8);ctx.lineTo(s*.22,-s*1.8);ctx.closePath();ctx.fill();
  }
  // Label
  if(label){ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.roundRect(-26,s*.15,52,16,4);ctx.fill();ctx.fillStyle='#f5c518';ctx.font=`bold 10px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,0,s*.23);}
  ctx.restore();
}

function drawBallAt(ctx,x,y,r,bounce=0){

// Perspective pitch (side view) helpers
function makePitch(W,H){
  const VY=H*.3, BY=H*.97, BW=W*1.0, TW=W*.36;
  return {
    VY,BY,BW,TW,
    toS(wx,wy){
      const lw=TW+(BW-TW)*wy;
      const ly=VY+(BY-VY)*wy;
      return {x:W*.5+(wx-.5)*lw, y:ly, sc:0.3+0.7*wy};
    },
    line(ctx,x1,y1,x2,y2,col,lw){
      const a=this.toS(x1,y1),b=this.toS(x2,y2);
      ctx.strokeStyle=col;ctx.lineWidth=lw;
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
    },
    arc(ctx,cx,cy,rx,ry,a0,a1,col,lw,steps=40){
      ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.beginPath();
      for(let i=0;i<=steps;i++){
        const a=a0+(a1-a0)*(i/steps);
        const p=this.toS(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry);
        i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
      }ctx.stroke();
    }
  };
}

  // Floodlights

    lg.addColorStop(0,'rgba(255,255,180,1)');lg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lx,ly,38,0,Math.PI*2);ctx.fill();

function drawPerspectivePitch(ctx,W,H,P){
  const {VY,BY}=P;
  const pitchG=ctx.createLinearGradient(0,VY,0,BY);
  pitchG.addColorStop(0,'#2a8830');pitchG.addColorStop(.5,'#3aaa40');pitchG.addColorStop(1,'#2d9035');
  ctx.fillStyle=pitchG;
  const tl=P.toS(0,0),tr=P.toS(1,0),br=P.toS(1,1),bl=P.toS(0,1);
  ctx.beginPath();ctx.moveTo(tl.x,tl.y);ctx.lineTo(tr.x,tr.y);ctx.lineTo(br.x,br.y);ctx.lineTo(bl.x,bl.y);ctx.closePath();ctx.fill();
  // Stripes
  for(let i=0;i<8;i++){if(i%2===0)continue;const y1=i/8,y2=(i+1)/8;const a=P.toS(0,y1),b=P.toS(1,y1),c=P.toS(1,y2),d=P.toS(0,y2);ctx.fillStyle='rgba(0,0,0,.06)';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.lineTo(d.x,d.y);ctx.closePath();ctx.fill();}

function makePitch(W,H){
  const VY=H*.30,BY=H*.97,BW=W*1.0,TW=W*.36;
  return{VY,BY,BW,TW,
    toS(wx,wy){const lw=TW+(BW-TW)*wy;const ly=VY+(BY-VY)*wy;return{x:W*.5+(wx-.5)*lw,y:ly,sc:.28+.72*wy};},
    line(ctx,x1,y1,x2,y2,col,lw){const a=this.toS(x1,y1),b=this.toS(x2,y2);ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();},
    arc(ctx,cx,cy,rx,ry,a0,a1,col,lw,steps=40){ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.beginPath();for(let i=0;i<=steps;i++){const a=a0+(a1-a0)*(i/steps);const p=this.toS(cx+Math.cos(a)*rx,cy+Math.sin(a)*ry);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}ctx.stroke();}
  };
}

function s2w(P,sx,sy,W){
  let wy=.5;
  for(let i=0;i<24;i++){const p=P.toS(.5,wy);wy-=(p.y-sy)/(P.BY-P.VY);}
  wy=Math.max(.01,Math.min(.99,wy));
  const lw=P.TW+(P.BW-P.TW)*wy;
  return{wx:Math.max(.02,Math.min(.98,.5+(sx-W*.5)/lw)),wy};
}

function drawFlash(ctx,W,H,msg,t){

// ═══ GAME 1 — 1v1 DRIBBLE & SHOOT ═══════════════════════════
GAMES.dribble = function(canvas){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const P=makePitch(W,H);
  const crowd=Array.from({length:140},(_,i)=>({x:Math.random()*W,y:P.VY*.1+Math.random()*P.VY*.75,r:3+Math.random()*2,c:['#cc2200','#006847','#fff','#f5c518'][i%4],px:Math.random()*Math.PI*2}));
  const pl={wx:.1,wy:.5,r:.026,spd:.007,hasBall:true};
  const def={wx:.45,wy:.5,r:.026,spd:.0032,phase:0};
  const gk={wx:.96,wy:.5,r:.028};
  const ball={wx:.12,wy:.5,vx:0,vy:0,z:0,vz:0};
  let ballOwner='player';
  const gates=[];
  for(let i=0;i<5;i++){const gx=.2+i*.13,gy=.22+Math.random()*.56;gates.push({x:gx,y1:gy-.07,y2:gy+.07,done:false,flash:0});}
  const GOAL={x:.98,y1:.37,y2:.63};
  let pts=[],wT=0,hitCd=0,flashMsg='',flashT=0,shootHeld=0,shootIv=null;
  let mouseX=W*.9,mouseY=H*.5;
  canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=(e.clientX-r.left)*(W/r.width);mouseY=(e.clientY-r.top)*(H/r.height);});
  function kick(twx,twy,pow){const dx=twx-ball.wx,dy=twy-ball.wy,d=Math.hypot(dx,dy)||.001;ball.vx=dx/d*pow;ball.vy=dy/d*pow;ball.vz=pow*.4;ball.z=.01;ballOwner='free';}
  function loop(){
    if(!gameActive)return;
    gameRAF=requestAnimationFrame(loop);wT+=.04;if(hitCd>0)hitCd--;if(flashT>0)flashT--;
    let mvx=0,mvy=0;
    if(keys['ArrowLeft']||keys['KeyA'])mvx=-pl.spd;if(keys['ArrowRight']||keys['KeyD'])mvx+=pl.spd;
    if(keys['ArrowUp']||keys['KeyW'])mvy-=pl.spd*.7;if(keys['ArrowDown']||keys['KeyS'])mvy+=pl.spd*.7;
    pl.wx=Math.max(.02,Math.min(.97,pl.wx+mvx));pl.wy=Math.max(.03,Math.min(.97,pl.wy+mvy));
    if(ballOwner==='player'){ball.wx=pl.wx+mvx*4;ball.wy=pl.wy+mvy*4;}
    if(ballOwner==='free'&&hitCd===0&&Math.hypot(pl.wx-ball.wx,pl.wy-ball.wy)<pl.r+.022){ballOwner='player';ball.vx=0;ball.vy=0;}
    def.phase+=.03;
    const tdx=pl.wx-def.wx,tdy=pl.wy-def.wy,td=Math.hypot(tdx,tdy)||.001;
    const defClose=td<.15;const defSpd=defClose?def.spd*.45:def.spd;def.wx+=tdx/td*defSpd+Math.sin(def.phase)*.001;def.wy+=tdy/td*defSpd*.8+Math.cos(def.phase*.7)*.0007;
    def.wx=Math.max(.03,Math.min(.97,def.wx));def.wy=Math.max(.03,Math.min(.97,def.wy));
    if(ballOwner==='player'&&Math.hypot(def.wx-pl.wx,def.wy-pl.wy)<def.r+pl.r+.004&&hitCd===0){
      ballOwner='free';hitCd=90;ball.vx=(Math.random()-.5)*.025;ball.vy=(Math.random()-.5)*.015;
      spawnPts(pts,P.toS(pl.wx,pl.wy).x,P.toS(pl.wx,pl.wy).y,['#cc2200','#fff'],10);showToast('😤 TACKLED!');
      setTimeout(()=>{if(gameActive&&ballOwner==='free'){ballOwner='player';}},800);

// ═══ GAME 3 — PASS & SCORE ═════════════════════════════════
GAMES.keepaway = function(canvas){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const P=makePitch(W,H);
  const crowd=Array.from({length:140},(_,i)=>({x:Math.random()*W,y:P.VY*.08+Math.random()*P.VY*.75,r:3+Math.random()*2,c:['#cc2200','#006847','#fff','#f5c518'][i%4],px:Math.random()*Math.PI*2}));

  // Fixed positions — mate does NOT move while holding ball (stops glitch)
  const MATE_POS = {wx:.72, wy:.48};
  const pl   = {wx:.18, wy:.5,  r:.026};
  const mate = {wx:.72, wy:.48, r:.024};
  const def  = {wx:.42, wy:.5,  r:.026, spd:.003, phase:0};
  const gk   = {wx:.96, wy:.5,  r:.028};
  const CPU_GOAL = {x:.98, y1:.37, y2:.63};

  // Ball state: position + who holds it
  const ball = {wx:.18, wy:.5, vx:0, vy:0, z:0, vz:0};
  // 'player' | 'mate' | 'free'
  let holder = 'player';
  let passed = false;  // must pass before shooting counts
  let goals  = 0;
  let hitCd  = 0;      // tackle cooldown
  let shootHeld = 0, shootIv = null;
  let stallCd = 0;    // counts frames ball is nearly still while free
  let wT = 0, flashMsg = '', flashT = 0;
  let pts = [];
  let mouseX = W*.85, mouseY = H*.5;

  canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseY = (e.clientY - r.top)  * (H / r.height);
  });

  function reset() {
    pl.wx=.18; pl.wy=.5;
    mate.wx=MATE_POS.wx; mate.wy=MATE_POS.wy;
    def.wx=.42; def.wy=.5;
    ball.wx=.18; ball.wy=.5; ball.vx=0; ball.vy=0; ball.z=0; ball.vz=0;
    holder='player'; passed=false; hitCd=80; stallCd=0;
    if(shootIv){clearInterval(shootIv);shootIv=null;} shootHeld=0;
  }

  function loop(){
    if(!gameActive) return;
    gameRAF = requestAnimationFrame(loop);
    wT += .04;
    if(hitCd > 0) hitCd--;
    if(flashT > 0) flashT--;

    // ── PLAYER MOVEMENT (only when player holds ball) ──────────
    let mvx=0, mvy=0;
    if(holder==='player'){
      if(keys['ArrowLeft'] ||keys['KeyA']) mvx = -.007;
      if(keys['ArrowRight']||keys['KeyD']) mvx =  .007;
      if(keys['ArrowUp']   ||keys['KeyW']) mvy = -.005;
      if(keys['ArrowDown'] ||keys['KeyS']) mvy =  .005;

      pl.wy = Math.max(.02, Math.min(.97, pl.wy + mvy));

      ball.wy = pl.wy + mvy*3;
    }

    // ── MATE: stays locked in position while holding ball ──────
    // Only drift when nobody holds it (so pass target is stable)
    if(holder !== 'mate'){
      mate.wx += (MATE_POS.wx - mate.wx) * .04;
      mate.wy += (MATE_POS.wy - mate.wy) * .04;
    } else {
      // Mate has ball — ball sticks exactly to mate, mate is STILL
      ball.wx = mate.wx;
      ball.wy = mate.wy;
    }

    // ── DEFENDER chases whoever has the ball ───────────────────
    def.phase += .025;
    const tgt = holder==='player' ? pl : holder==='mate' ? mate : pl;
    const tdx = tgt.wx - def.wx, tdy = tgt.wy - def.wy;
    const tdd = Math.hypot(tdx, tdy) || .001;
    const dspd = tdd < .2 ? def.spd * .45 : def.spd;
    def.wx += tdx/tdd * dspd + Math.sin(def.phase) * .0008;
    def.wy += tdy/tdd * dspd * .8;

    def.wy = Math.max(.04, Math.min(.96, def.wy));

      holder='free'; hitCd=120;
      ball.vx=(Math.random()-.5)*.018; ball.vy=(Math.random()-.5)*.012;
      flashMsg='😤 TACKLED!'; flashT=60;
      spawnPts(pts, P.toS(pl.wx,pl.wy).x, P.toS(pl.wx,pl.wy).y, ['#cc2200'], 10);
      showToast('😤 TACKLED! Resetting...');
      setTimeout(()=>{ if(gameActive) reset(); }, 1400);
    }

    // Tackle mate
    if(holder==='mate' && hitCd===0 &&
       Math.hypot(def.wx-mate.wx, def.wy-mate.wy) < def.r+mate.r+.005){
      holder='free'; hitCd=120;
      ball.vx=(Math.random()-.5)*.016; ball.vy=(Math.random()-.5)*.01;
      flashMsg='😤 INTERCEPTED!'; flashT=60;
      spawnPts(pts, P.toS(mate.wx,mate.wy).x, P.toS(mate.wx,mate.wy).y, ['#cc2200'], 10);
      showToast('😤 Intercepted! Resetting...');
      setTimeout(()=>{ if(gameActive) reset(); }, 1400);
    }

    // ── GK tracks ball Y ───────────────────────────────────────
    const gkTy = Math.max(CPU_GOAL.y1+.06, Math.min(CPU_GOAL.y2-.06, ball.wy));
    gk.wy += (gkTy - gk.wy) * .04;

    // ── FREE BALL PHYSICS ──────────────────────────────────────
    if(holder==='free'){
      ball.wx += ball.vx; ball.wy += ball.vy;
      ball.vx *= .92; ball.vy *= .92;
      ball.z  += ball.vz; ball.vz -= .025;
      if(ball.z < 0){ ball.z=0; ball.vz *= -.2; }
      ball.wx = Math.max(.01, Math.min(.99, ball.wx));
      ball.wy = Math.max(.01, Math.min(.99, ball.wy));
      // Stall check: if ball barely moving and nobody picking it up, reset
      if(Math.abs(ball.vx)<.0008 && Math.abs(ball.vy)<.0008 && ball.z<.01){
        stallCd++;
        if(stallCd>90){ reset(); return; }  // ~1.5s stalled = reset
      } else { stallCd=0; }

      if(ball.wx > CPU_GOAL.x-.01 &&
         ball.wy > CPU_GOAL.y1 && ball.wy < CPU_GOAL.y2 && ball.z < .15){

        if(!passed){
          flashMsg='❌ Pass first!'; flashT=70;
          showToast('❌ Pass to #9 first, then shoot!');

          showToast('🧤 Keeper saved it!');

          $('g-score').textContent = gameScore+' / '+currentChapter.game.target;
          flashMsg='⚽ GOLAZO!'; flashT=90;
          spawnPts(pts, W*.9, H*.5, ['#006847','#f5c518','#fff','#CE1126'], 24);

      {wx:def.wx,  wy:def.wy,  t:'def'},
      {wx:gk.wx,   wy:gk.wy,   t:'gk'},
      {wx:mate.wx, wy:mate.wy, t:'mate'},
      {wx:pl.wx,   wy:pl.wy,   t:'pl'},

      const sz = sc * H * .1;

        drawPerson(ctx,x,y,sz,{shirt:'#006847',shorts:'#fff',num:10,skin:'#c8a060',highlight:true,moving:mvx!==0||mvy!==0,label:'YOU'});
      else if(e.t==='mate'){

      }
      else if(e.t==='def')
        drawPerson(ctx,x,y,sz,{shirt:'#cc2200',shorts:'#111',num:5,skin:'#c8a060',moving:true,label:'DEF'});

        drawPerson(ctx,x,y,sz,{shirt:'#e8c000',shorts:'#1a1a6a',num:1,skin:'#c8a060',gk:true,label:'GK'});
    });

      ctx.beginPath(); ctx.moveTo(pp.x,pp.y); ctx.lineTo(mp.x,mp.y); ctx.stroke();

    ctx.fillStyle='#f5c518'; ctx.font='11px Nunito'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(hint, W/2, H-16);
  }

  function onKey(e){
    if(!gameActive) return;
    // SHIFT = Pass (only when player holds ball)
    if((e.code==='ShiftLeft'||e.code==='ShiftRight') && holder==='player'){
      e.stopPropagation(); e.preventDefault();
      // Teleport ball to mate instantly, freeze mate in place
      ball.wx=mate.wx; ball.wy=mate.wy;
      ball.vx=0; ball.vy=0; ball.z=0; ball.vz=0;
      holder='mate'; passed=true;
      showToast('↗ PASS! Aim with mouse, SPACE to shoot!');
      return;
    }
    // SPACE = start charging shot (only when mate holds ball)
    if(e.code==='Space' && holder==='mate'){
      e.stopPropagation(); e.preventDefault();
      if(!shootIv){ shootHeld=0; shootIv=setInterval(()=>{ shootHeld=Math.min(100,shootHeld+3.5); },30); }
    }
  }

  function onKeyUp(e){
    if(!gameActive) return;
    if(e.code==='Space' && shootIv){
      e.stopPropagation(); e.preventDefault();
      clearInterval(shootIv); shootIv=null;
      if(holder==='mate'){
        const aw = s2w(P, mouseX, mouseY, W);
        // Aim toward mouse, default to goal center if mouse not moved
        const tx = (aw && aw.wx > .5) ? aw.wx : CPU_GOAL.x - .03;
        const ty = (aw && aw.wy > 0 ) ? aw.wy : .5;
        const dx = tx-mate.wx, dy = ty-mate.wy, d = Math.hypot(dx,dy)||.001;
        const pow = .016 + shootHeld * .00032;
        ball.wx = mate.wx; ball.wy = mate.wy;
        ball.vx = dx/d*pow; ball.vy = dy/d*pow;
        ball.vz = pow * .45; ball.z = .01;
        holder = 'free';
        showToast(shootHeld > 75 ? '🚀 POWER SHOT!' : '⚽ SHOOT!');
        // Always reset 1.8s after shot — catches misses, side balls, everything
        setTimeout(()=>{ if(gameActive && holder==='free') reset(); }, 1800);
      }
      shootHeld = 0;
    }
  }

  document.addEventListener('keydown', onKey, true);
  document.addEventListener('keyup',   onKeyUp, true);
  setTimeout(()=>{
    document.removeEventListener('keydown', onKey, true);
    document.removeEventListener('keyup',   onKeyUp, true);
  }, (currentChapter?.game?.time||65)*1000 + 2000);
  loop();
};

};


GAMES.worldcup = function(canvas){

  function nextRound(){

  function drawStands(){

        ctx.fillStyle=['#f5c518','#CE1126','#006847','#fff','#ff8800'][i];

    const boards=[['MEXICO 2026','#006847'],['FIFA WORLD CUP','#f5c518'],['⚽ EL CAMINO ⚽','#CE1126'],['CLUB AMERICA','#f5c518'],['AZTECA 2026','#006847']];
    boards.forEach((b,i)=>{ctx.fillStyle=b[1];ctx.fillRect(i*(W/5),VY-19,W/5-1,19);ctx.fillStyle=b[1]==='#f5c518'?'#000':'#fff';ctx.font=`bold ${Math.max(8,W*.011)}px Nunito`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(b[0],i*(W/5)+W/10,VY-9.5);});
    lights.forEach(l=>{ctx.fillStyle='#666';ctx.fillRect(l.x-3,l.y,6,H*.2);ctx.fillStyle='#ccc';ctx.fillRect(l.x-16,l.y-5,32,8);const lg=ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,36);lg.addColorStop(0,'rgba(255,255,180,1)');lg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=lg;ctx.beginPath();ctx.arc(l.x,l.y,36,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.07;ctx.fillStyle='#ffffc0';ctx.beginPath();ctx.moveTo(l.x,l.y+7);ctx.lineTo(l.x-110,VY+25);ctx.lineTo(l.x+110,VY+25);ctx.closePath();ctx.fill();ctx.globalAlpha=1;});
  }

  function drawPitchEndOn(){
    const pitG=ctx.createLinearGradient(0,PITCH_Y,0,H);pitG.addColorStop(0,'#2a8830');pitG.addColorStop(.5,'#3aaa40');pitG.addColorStop(1,'#28882e');
    ctx.fillStyle=pitG;ctx.fillRect(0,PITCH_Y,W,H-PITCH_Y);
    for(let i=0;i<10;i++){ctx.fillStyle=i%2?'rgba(0,0,0,.06)':'rgba(255,255,255,.03)';ctx.fillRect(i*(W/10),PITCH_Y,W/10,H-PITCH_Y);}
    // Glow
    const gl=ctx.createRadialGradient(W/2,PITCH_Y,0,W/2,PITCH_Y,W*.6);gl.addColorStop(0,'rgba(180,255,180,.18)');gl.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gl;ctx.fillRect(0,PITCH_Y,W,H-PITCH_Y);
    // Penalty area
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2.5;
    ctx.strokeRect(W*.15,PITCH_Y,W*.7,H*.28);ctx.strokeRect(GBL-10,PITCH_Y,GBR-GBL+20,H*.07);
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(W*.5,H*.78,W*.12,Math.PI*1.15,Math.PI*1.85);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(W*.5,H*.78,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,PITCH_Y);ctx.lineTo(W,PITCH_Y);ctx.stroke();

    // 3D Goal
    const DEPTH=38;
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.moveTo(GGL-DEPTH,GT-DEPTH);ctx.lineTo(GGR+DEPTH,GT-DEPTH);ctx.lineTo(GBR+DEPTH,GH-DEPTH);ctx.lineTo(GBL-DEPTH,GH-DEPTH);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1;
    for(let n=0;n<=11;n++){const nx=GGL-DEPTH+(GGR+DEPTH-(GGL-DEPTH))*n/11;const nx2=GBL-DEPTH+(GBR+DEPTH-(GBL-DEPTH))*n/11;ctx.beginPath();ctx.moveTo(nx,GT-DEPTH);ctx.lineTo(nx2,GH-DEPTH);ctx.stroke();}
    for(let n=0;n<=6;n++){const sc=n/6;const lx=(GGL-DEPTH)+(GBL-DEPTH-(GGL-DEPTH))*sc;const rx=(GGR+DEPTH)+(GBR+DEPTH-(GGR+DEPTH))*sc;ctx.beginPath();ctx.moveTo(lx,GT-DEPTH+sc*(GH-GT));ctx.lineTo(rx,GT-DEPTH+sc*(GH-GT));ctx.stroke();}
    ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1;
    for(let n=0;n<=11;n++){const nx=GGL+(GGR-GGL)*n/11;const nx2=GBL+(GBR-GBL)*n/11;ctx.beginPath();ctx.moveTo(nx,GT);ctx.lineTo(nx2,GH);ctx.stroke();}
    for(let n=0;n<=7;n++){const sc=n/7;const lx=GGL+(GBL-GGL)*sc;const rx=GGR+(GBR-GGR)*sc;ctx.beginPath();ctx.moveTo(lx,GT+sc*(GH-GT));ctx.lineTo(rx,GT+sc*(GH-GT));ctx.stroke();}
    ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(GGL,GT);ctx.lineTo(GBL,GH);ctx.stroke();ctx.beginPath();ctx.moveTo(GGR,GT);ctx.lineTo(GBR,GH);ctx.stroke();ctx.beginPath();ctx.moveTo(GGL,GT);ctx.lineTo(GGR,GT);ctx.stroke();ctx.beginPath();ctx.moveTo(GBL,GH);ctx.lineTo(GBR,GH);ctx.stroke();
    ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(GGL,GT);ctx.lineTo(GGL-DEPTH,GT-DEPTH);ctx.stroke();ctx.beginPath();ctx.moveTo(GGR,GT);ctx.lineTo(GGR+DEPTH,GT-DEPTH);ctx.stroke();ctx.beginPath();ctx.moveTo(GGL-DEPTH,GT-DEPTH);ctx.lineTo(GGR+DEPTH,GT-DEPTH);ctx.stroke();
  }

  function drawGK(){
    const kx=keeperX,ky=GH-8;
    const sz=H*.088;
    ctx.save();ctx.translate(kx,ky);
    if(keeperDived){const lean=keeperDiveX<W*.5?-1:1;ctx.rotate(lean*.4);}
    drawPerson(ctx,0,0,sz,{shirt:'#e8c000',shorts:'#1a1a6a',num:'',skin:'#c8a060',gk:true,moving:keeperDived});
    ctx.restore();
  }

  function drawShooterChar(sx,sy){
    const sz=H*.065;
    drawPerson(ctx,sx,sy,sz,{shirt:'#006847',shorts:'#fff',num:10,skin:'#c8a060',boots:'#111',moving:isWalking,highlight:true});
  }

  function drawAimCursor(){
    const relX=(aimX-GBL)/(GBR-GBL);
    const curY=GT+16+(1-.5)*(GH-GT)*.85;
    ctx.strokeStyle='rgba(255,220,0,.85)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(aimX-16,curY);ctx.lineTo(aimX+16,curY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(aimX,curY-16);ctx.lineTo(aimX,curY+16);ctx.stroke();
    ctx.beginPath();ctx.arc(aimX,curY,10,0,Math.PI*2);ctx.stroke();
    const zone=relX<.3?'◀ LEFT CORNER':relX>.7?'RIGHT CORNER ▶':'● CENTER';
    ctx.fillStyle='rgba(255,220,0,.9)';ctx.font='bold 14px Nunito';ctx.textAlign='center';ctx.fillText(zone,aimX,curY-26);
    ctx.strokeStyle='rgba(255,220,0,.2)';ctx.setLineDash([7,7]);ctx.beginPath();ctx.moveTo(shooterX,H*.78);ctx.lineTo(aimX,curY);ctx.stroke();ctx.setLineDash([]);
  }

  function drawScoreTracker(){
    const sbW=360,sbH=46,sbX=(W-sbW)/2;
    ctx.fillStyle='rgba(0,0,0,.9)';ctx.beginPath();ctx.roundRect(sbX,6,sbW,sbH,10);ctx.fill();
    ctx.strokeStyle='#f5c518';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(sbX,6,sbW,sbH,10);ctx.stroke();
    ctx.fillStyle='#006847';ctx.font='bold 13px Nunito';ctx.textAlign='left';ctx.fillText('🇲🇽 MEXICO',sbX+10,6+sbH/2+5);
    ctx.fillStyle='#cc2200';ctx.textAlign='right';ctx.fillText('🤖 CPU',sbX+sbW-10,6+sbH/2+5);
    ctx.fillStyle='#f5c518';ctx.textAlign='center';ctx.font='bold 20px Bangers';ctx.fillText(`${mexScore} — ${cpuScore}`,W/2,6+sbH/2+6);
    // Dot tracker
    const dotR=10,dotGap=5,n5=5,rowW=n5*(dotR*2+dotGap);
    const r1x=(W-rowW*2-24)/2,r2x=r1x+rowW+24,dY=6+sbH+16;
    const mexK=kicked.filter(k=>k.team==='mex'),cpuK=kicked.filter(k=>k.team==='cpu');
    ctx.fillStyle='rgba(0,0,0,.55)';ctx.beginPath();ctx.roundRect(r1x-8,dY-dotR-4,rowW+16,dotR*2+8,8);ctx.fill();ctx.beginPath();ctx.roundRect(r2x-8,dY-dotR-4,rowW+16,dotR*2+8,8);ctx.fill();
    for(let i=0;i<5;i++){const kx=r1x+i*(dotR*2+dotGap)+dotR;ctx.fillStyle=i<mexK.length?(mexK[i].scored?'#006847':'#cc2200'):'#333';ctx.beginPath();ctx.arc(kx,dY,dotR,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1.5;ctx.stroke();if(i<mexK.length){ctx.fillStyle='#fff';ctx.font='bold 9px Nunito';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(mexK[i].scored?'⚽':'✗',kx,dY);}}

    ctx.fillStyle='rgba(0,255,100,.6)';ctx.font='9px Nunito';ctx.textAlign='left';ctx.fillText('MEX',r1x-6,dY+dotR+12);
    ctx.fillStyle='rgba(220,60,60,.8)';ctx.fillText('CPU',r2x-6,dY+dotR+12);
  }

  function loop(){
    if(!gameActive){return;}
    gameRAF=requestAnimationFrame(loop);wT+=.04;
    if(resultT>0)resultT--;

    // Walk-up animation
    if(phase==='walkup'){
      walkerY=Math.max(walkerTargetY,walkerY-2.5);
      if(walkerY<=walkerTargetY){isWalking=false;phase='aim';}
    }
    if(phase==='aim'){
      aimX+=aimSpd*aimDir;if(aimX>GBR-15||aimX<GBL+15)aimDir*=-1;
      // Mouse override
      if(Math.abs(mouseX-W*.5)<W*.45)aimX=Math.max(GBL+15,Math.min(GBR-15,mouseX));

    }
    if(phase==='power'){
      keeperX+=(W*.5-keeperX)*.02;
      // Space held — see keydown/keyup
    }

        const keeperSaves=Math.abs(keeperX-ballTX)<32&&keeperDived;

        else{resultMsg='🧤 SAVED!';kicked.push({team:'mex',scored:false});}
        gameScore=mexScore;$('g-score').textContent=`MEX ${mexScore}-${cpuScore} CPU`;

    if(phase==='result_mex'){if(resultT<=0)nextRound();}
    if(phase==='cpu_prep'){

        const cpuAim=Math.random()<.45?GBL+35+Math.random()*55:GBR-90+Math.random()*55;
        cpuKickAimX=cpuAim;
        const cpuTY=GT+15+Math.random()*(GH-GT-25);
        keeperDiveX=cpuAim+(Math.random()-.5)*80;keeperDived=true;
        ballX=W*.5;ballY=H*.42;ballTX=cpuAim;ballTY=cpuTY;ballProg=0;
        phase='cpu_fly';
      }
    }
    if(phase==='cpu_fly'){
      ballProg=Math.min(1,ballProg+.033);
      ballX=W*.5+(ballTX-W*.5)*ballProg;ballY=H*.42+(ballTY-H*.42)*ballProg;
      ballZ=Math.max(0,Math.sin(ballProg*Math.PI)*.35);
      if(ballProg>=1){
        const saveP=.22+round*.01;const userSave=userMovedKeeper&&Math.abs(keeperX-cpuKickAimX)<55;const saved=userSave||Math.random()<saveP;userMovedKeeper=false;
        if(!saved){cpuScore++;resultMsg='😱 CPU SCORES!';}else{resultMsg='🧤 GREAT SAVE!';}
        kicked.push({team:'cpu',scored:!saved});gameScore=mexScore;
        $('g-score').textContent=`MEX ${mexScore}-${cpuScore} CPU`;
        if(!saved)spawnPts(pts,ballTX,ballTY,['#cc2200','#fff'],16);
        else spawnPts(pts,keeperX,GH-8,['#006847','#f5c518'],12);
        resultT=90;phase='result_cpu';
      }

    if(phase==='result_cpu'){if(resultT<=0)nextRound();}
    if(phase==='done'){gameScore=mexScore;endGame();return;}

    tickPts(pts);

    // ── DRAW ──────────────────────────────────────────────────
    drawStands();drawPitchEndOn();
    drawGK();

    // Ball
    const br=H*.024*(0.6+ballY/H*.4);
    const drawBY=ballY-ballZ*H*.35;
    const shadowA=Math.max(0,.38-ballZ*.3);
    ctx.fillStyle=`rgba(0,0,0,${shadowA})`;ctx.beginPath();ctx.ellipse(ballX,ballY,br*1.3,br*.42,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ballX,drawBY,br*(1+ballZ*.18),0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=1.2;ctx.stroke();
    for(let i=0;i<5;i++){const a=i*Math.PI*2/5+wT*3;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(ballX+Math.cos(a)*br*.48,drawBY+Math.sin(a)*br*.35,br*.2,0,Math.PI*2);ctx.fill();}

    drawPts(ctx,pts);

    // Shooter / CPU kicker
    if(ORDER[round]==='mex'&&(phase==='walkup'||phase==='aim'||phase==='power'||phase==='fly')){
      drawShooterChar(shooterX,walkerY);
    }
    if(ORDER[round]==='cpu'&&(phase==='cpu_prep')){
      const sz=H*.062;drawPerson(ctx,W*.5,H*.86,sz,{shirt:'#cc2200',shorts:'#222',num:ORDER.indexOf('cpu')+1,skin:'#c8a060',moving:false,label:'CPU'});
    }

    // Aim cursor (only during aim phase)
    if(phase==='aim')drawAimCursor();

    // Power bar (during power phase)
    if(phase==='power'||powering){
      const bw=240,bx=(W-bw)/2,by=H*.9;
